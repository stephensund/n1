name: Build ImmortalWrt-25.12 for N1 with ROOTFS

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # ✅ 增加 4GB Swap（核心修复：防止 perl/luci 编译时卡死）
    - name: Add swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update > /dev/null
        sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/2410) > /dev/null
        sudo -E apt-get -qq install -y libncurses-dev > /dev/null
        sudo -E apt-get -qq autoremove --purge > /dev/null
        sudo -E apt-get -qq clean > /dev/null
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        chmod +x diy.sh
        cd openwrt
        ./scripts/feeds update -a
        $GITHUB_WORKSPACE/diy.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load N1 custom config
      run: |
        rm -rf openwrt/files openwrt/.config
        mv files .config openwrt/

    - name: SSH connect to Actions
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j$(( $(nproc) * 2 ))
        find dl -size -1k -exec rm -f {} \;

    - name: Compile N1 firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo "Use 1 thread for stable build"
        make -j2 --quiet

    - name: Inject Mihomo ARM64 Core + GEO Files + Default Meta
      run: |
        # -----------------------------
        # 1. Fetch latest Mihomo tag
        # -----------------------------
        TAG=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | sed 's/.*"tag_name": "\(.*\)".*/\1/')
        echo "Latest Mihomo tag: $TAG"

        # -----------------------------
        # 2. Download Mihomo ARM64 Core
        # -----------------------------
        CORE_URL="https://github.com/MetaCubeX/mihomo/releases/download/${TAG}/mihomo-linux-arm64-${TAG}.gz"

        mkdir -p mihomo_core
        echo "Downloading Mihomo ARM64 core..."
        curl -L "$CORE_URL" -o mihomo_core/mihomo.gz
        gunzip mihomo_core/mihomo.gz
        chmod +x mihomo_core/mihomo

        # -----------------------------
        # 3. Download Loyalsoldier GEO Files
        # -----------------------------
        GEOIP_URL="https://raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.dat"
        GEOSITE_URL="https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat"

        mkdir -p geo_files
        curl -L $GEOIP_URL -o geo_files/geoip.dat
        curl -L $GEOSITE_URL -o geo_files/geosite.dat

        # -----------------------------
        # 4. Unpack rootfs
        # -----------------------------
        ROOTFS=$(ls -1 openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz | head -n 1)
        echo "Using ROOTFS: $ROOTFS"

        rm -rf rootfs_work
        mkdir rootfs_work
        tar -xzf "$ROOTFS" -C rootfs_work

        # -----------------------------
        # 5. Install Mihomo core
        # -----------------------------
        mkdir -p rootfs_work/etc/openclash/core
        cp -f mihomo_core/mihomo rootfs_work/etc/openclash/core/clash-meta
        chmod +x rootfs_work/etc/openclash/core/clash-meta

        # -----------------------------
        # 6. Install GEO files
        # -----------------------------
        cp -f geo_files/geoip.dat rootfs_work/etc/openclash/
        cp -f geo_files/geosite.dat rootfs_work/etc/openclash/

        # -----------------------------
        # 7. Force Meta as default
        # -----------------------------
        echo "meta" > rootfs_work/etc/openclash/core_version

        if [ ! -f rootfs_work/etc/openclash/config.yaml ]; then
            echo "core_type: meta" > rootfs_work/etc/openclash/config.yaml
        else
            sed -i "s/^core_type:.*/core_type: meta/" rootfs_work/etc/openclash/config.yaml || true
        fi

        # -----------------------------
        # 8. Repack rootfs
        # -----------------------------
        tar -czf "$ROOTFS" -C rootfs_work .

        echo "Mihomo (dynamic latest) + GEO injection completed."

    - name: Package armsr as openwrt
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.6.y
        PACKAGE_SOC: diy
        GZIP_IMGS: .xz
        SCRIPT_DIY_PATH: mk_s905d_n1.sh
        WHOAMI: nantayo
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Locate rootfs
      id: rootfs
      run: |
        ROOTFS=$(ls -1 openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz | head -n 1)
        if [ -z "$ROOTFS" ]; then
          echo "No rootfs found"; exit 1
        fi
        echo "ROOTFS_PATH=$ROOTFS" >> $GITHUB_ENV
        echo "rootfs=$ROOTFS" >> $GITHUB_OUTPUT
        echo "Found ROOTFS: $ROOTFS"

    - name: Upload rootfs as artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: rootfs-tarball
        path: ${{ env.ROOTFS_PATH }}
        if-no-files-found: error
      continue-on-error: true

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      with:
        tag_name: OpenWrt_${{ env.PACKAGED_OUTPUTDATE }}
        files: |
          ${{ env.PACKAGED_OUTPUTPATH }}/*.img.xz
          ${{ env.ROOTFS_PATH }}
        body: |
          首次使用建议全新刷写
          IP: 192.168.2.5
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 2
        delete_tags: true
